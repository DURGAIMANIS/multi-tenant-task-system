<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TenantFlow — Login</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="brand">
      <span class="brand-name">TenantFlow</span>
    </div>
    <p class="brand-sub">Multi-tenant task management</p>

    <div class="tabs">
      <button class="tab active" data-tab="login" onclick="switchTab('login')">Login</button>
      <button class="tab" data-tab="register" onclick="switchTab('register')">Register</button>
    </div>

    <!-- Login -->
    <form id="loginForm" onsubmit="login(event)">
      <div class="field">
        <label>Email</label>
        <input type="email" id="loginEmail" placeholder="you@example.com" required />
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="••••••••" required />
      </div>
      <button type="submit" class="btn-primary" id="loginBtn">Login</button>
      <div class="divider"><span>or</span></div>
      <a href="/api/auth/google" class="btn-google" id="googleBtn" style="display:none">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.08 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-3.59-13.46-8.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        Continue with Google
      </a>
      <p class="forgot-link"><a href="#" onclick="switchTab('forgot')">Forgot password?</a></p>
      <p class="msg" id="loginMsg"></p>
    </form>

    <!-- Register -->
    <form id="registerForm" style="display:none" onsubmit="register(event)">
      <div class="field">
        <label>First Name</label>
        <input type="text" id="firstName" placeholder="John" required />
      </div>
      <div class="field">
        <label>Last Name</label>
        <input type="text" id="lastName" placeholder="Doe" required />
      </div>
      <div class="field">
        <label>Company Name</label>
        <input type="text" id="companyName" placeholder="Acme Corp" required />
      </div>
      <div class="field">
        <label>Role</label>
        <select id="regRole">
          <option value="admin">Admin</option>
          <option value="manager">Manager</option>
          <option value="employee">Employee</option>
        </select>
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" id="regEmail" placeholder="you@example.com" required />
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="regPassword" placeholder="••••••••" required />
      </div>
      <button type="submit" class="btn-primary" id="registerBtn">Register</button>
      <p class="msg" id="registerMsg"></p>
    </form>

    <!-- Forgot Password -->
    <form id="forgotForm" style="display:none" onsubmit="forgotPassword(event)">
      <div class="field">
        <label>Email</label>
        <input type="email" id="forgotEmail" placeholder="you@example.com" required />
      </div>
      <button type="submit" class="btn-primary" id="forgotBtn">Send Reset Link</button>
      <p class="forgot-link"><a href="#" onclick="switchTab('login')">&#8592; Back to Login</a></p>
      <p class="msg" id="forgotMsg"></p>
    </form>
  </div>
</div>
<script src="auth.js"></script>
</body>
</html>
